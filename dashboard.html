<!DOCTYPE html>
<html>
<body>
<h2>Dashboard</h2>
<button onclick="load()">Load Data</button>

<script>
async function load() {
  const token = localStorage.getItem("token");

  const res = await fetch("/api/data", {
    headers: { "Authorization": token }
  });

  const data = await res.json();
  alert(JSON.stringify(data));
}
</script>
</body>
</html>
